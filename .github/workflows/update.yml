name: Automatic update

on:
    schedule:
       - cron: '5 */12 * * *'

jobs:
    update:
        name: Update Job
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Update pulls
              run: ./update.sh

            - name: Commit and push
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'update pulls'
