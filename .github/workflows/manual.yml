name: Manual update

on: workflow_dispatch

jobs:
    update:
        name: Update Job
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Update pulls
              run: ./update.sh 1

            - name: Commit and push
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'update pulls'
